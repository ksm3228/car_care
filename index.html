<!--
  ============================================================
  설정 방법 (꼭 읽어주세요)
  ============================================================
  기존에 쓰시던 ward-app-257c4 Realtime Database를 그대로 사용하도록 만들었습니다.
  (danang_cards, patients, referral 등과 같은 위치에 car_care 라는 새 노드가 추가됩니다)

  1) 아래 firebaseConfig 의 apiKey / messagingSenderId / appId 값을 채워주세요.
     Firebase 콘솔 > 프로젝트 설정 > 일반 > 내 앱 > SDK 설정 및 구성 에서 복사
     (다른 ward-app 계열 앱에서 쓰던 값 그대로 복사해 붙여넣으면 됩니다)
     databaseURL, projectId 등은 스크린샷 기준으로 미리 채워뒀습니다.

  2) Authentication > Sign-in method 에서 Google 로그인이 켜져 있는지 확인하세요
     (이미 다른 앱에서 써서 켜져 있을 가능성이 높습니다).

  3) Realtime Database 규칙 예시 (로그인한 사람만 car_care 노드에 접근, 다른 노드는 건드리지 않음):

     {
       "rules": {
         "car_care": {
           ".read": "auth != null",
           ".write": "auth != null"
         }
       }
     }

     기존 규칙에 "car_care" 부분만 추가하시면 됩니다. (patients, referral 등 기존 규칙은 그대로 두세요)

  4) GitHub Pages 로 배포 시, Firebase 콘솔 > Authentication > 설정 > 승인된 도메인에
     본인의 깃허브 페이지 도메인(예: ksm3228.github.io)이 이미 등록되어 있을 거예요.
     안 되어 있다면 추가해주세요.
  ============================================================
-->

<style>
  :root{
    --bg:#14161b;
    --bg-2:#1c2027;
    --bg-3:#23272f;
    --line-dark: rgba(255,255,255,0.08);
    --paper:#faf6ec;
    --paper-2:#f1ead9;
    --paper-line: rgba(27,29,34,0.10);
    --ink:#1b1d22;
    --ink-soft:#71747c;
    --ink-faint:#9b9ea6;
    --amber:#e8862b;
    --amber-deep:#c96a18;
    --amber-soft:#f6d8ae;
    --steel:#4a6fa5;
    --steel-soft:#cdd9ea;
    --red:#d2483f;
    --red-soft:#f5d2cf;
    --green:#3f8f5f;
    --green-soft:#cfe7da;
    --radius:18px;
    --radius-sm:12px;
    --shadow: 0 10px 30px rgba(0,0,0,0.35);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; padding:0; background:var(--bg); }
  body{
    font-family:'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    color:#fff;
    min-height:100vh;
    overflow-x:hidden;
  }
  .mono{ font-family:'JetBrains Mono', monospace; font-variant-numeric: tabular-nums; }

  /* ---------- shell ---------- */
  #app{ max-width:560px; margin:0 auto; min-height:100vh; position:relative; padding-bottom: calc(96px + var(--safe-bottom)); }

  .topbar{
    position:sticky; top:0; z-index:30;
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 20px 10px;
    background:linear-gradient(180deg, var(--bg) 70%, transparent);
  }
  .topbar .brand{ display:flex; align-items:center; gap:8px; }
  .topbar .dot{ width:8px; height:8px; border-radius:50%; background:var(--amber); box-shadow:0 0 10px var(--amber); }
  .topbar h1{ font-size:15px; font-weight:700; letter-spacing:0.2px; margin:0; color:#fff; }
  .topbar .sub{ font-size:11px; color:var(--ink-faint); margin-top:1px; }
  .iconbtn{
    width:34px; height:34px; border-radius:50%; border:1px solid var(--line-dark);
    background:var(--bg-3); color:#fff; display:flex; align-items:center; justify-content:center;
    cursor:pointer; font-size:14px;
  }

  /* ---------- hero / odometer ---------- */
  .hero{ padding: 6px 20px 18px; }
  .hero-card{
    background: radial-gradient(120% 140% at 0% 0%, #262b34 0%, #181b21 65%);
    border:1px solid var(--line-dark);
    border-radius: var(--radius);
    padding:22px 20px 18px;
    position:relative;
    overflow:hidden;
  }
  .hero-card::after{
    content:""; position:absolute; right:-40px; top:-40px; width:140px; height:140px;
    background: radial-gradient(circle, rgba(232,134,43,0.25), transparent 70%);
  }
  .hero-label{ font-size:12px; color:var(--ink-faint); letter-spacing:0.3px; }
  .odometer{
    display:flex; align-items:baseline; gap:6px; margin-top:6px;
  }
  .odo-digits{
    display:flex; gap:3px;
  }
  .odo-digit{
    font-family:'JetBrains Mono', monospace;
    font-size:34px; font-weight:700;
    background:#0e1014;
    border:1px solid var(--line-dark);
    border-radius:6px;
    padding:4px 2px;
    min-width:24px;
    text-align:center;
    color:#fff;
    box-shadow: inset 0 -2px 0 rgba(255,255,255,0.04), inset 0 2px 4px rgba(0,0,0,0.6);
  }
  .odo-unit{ font-size:14px; color:var(--ink-faint); margin-left:4px; }
  .hero-meta{ margin-top:4px; font-size:12px; color:var(--ink-faint); }
  .hero-meta b{ color:var(--amber-soft); font-weight:600; }

  .stat-row{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-top:18px; }
  .stat{
    background:var(--bg-3); border:1px solid var(--line-dark); border-radius:var(--radius-sm);
    padding:10px 8px; text-align:center;
  }
  .stat .v{ font-family:'JetBrains Mono', monospace; font-size:15px; font-weight:700; color:#fff; }
  .stat .k{ font-size:10.5px; color:var(--ink-faint); margin-top:3px; }

  /* ---------- next due chips ---------- */
  .section-title{
    display:flex; align-items:center; justify-content:space-between;
    padding: 4px 20px 10px; margin-top:6px;
  }
  .section-title h2{ font-size:14px; margin:0; color:#fff; font-weight:700; }
  .section-title .count{ font-size:11px; color:var(--ink-faint); }

  .due-scroll{ display:flex; gap:10px; overflow-x:auto; padding:0 20px 4px; scrollbar-width:none; }
  .due-scroll::-webkit-scrollbar{ display:none; }
  .due-card{
    flex:0 0 auto; width:148px;
    background:var(--bg-3); border:1px solid var(--line-dark); border-radius:var(--radius-sm);
    padding:12px 12px 11px;
  }
  .due-card .cat{ display:flex; align-items:center; gap:6px; font-size:12px; font-weight:700; color:#fff; }
  .due-card .swatch{ width:8px; height:8px; border-radius:50%; }
  .due-card .due-status{ margin-top:8px; font-size:11px; padding:3px 7px; border-radius:20px; display:inline-block; font-weight:600; }
  .due-status.ok{ background:var(--green-soft); color:#1d4a31; }
  .due-status.soon{ background:var(--amber-soft); color:#7a4307; }
  .due-status.over{ background:var(--red-soft); color:#7a201a; }
  .due-status.none{ background:#2b2f37; color:var(--ink-faint); }
  .due-card .due-detail{ margin-top:6px; font-size:10.5px; color:var(--ink-faint); line-height:1.5; }
  .due-card .due-detail span{ color:#fff; font-family:'JetBrains Mono', monospace; }

  /* ---------- timeline / receipt cards ---------- */
  .timeline{ padding: 6px 20px 10px; display:flex; flex-direction:column; gap:14px; }

  .receipt{
    background: var(--paper);
    color: var(--ink);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    position:relative;
    padding: 16px 16px 14px;
  }
  .receipt::before{
    content:""; position:absolute; left:14px; right:14px; top:0; height:1px;
    background-image: radial-gradient(circle, var(--paper-2) 1.5px, transparent 1.5px);
    background-size: 8px 1px;
  }
  .receipt-top{ display:flex; align-items:flex-start; justify-content:space-between; gap:10px; }
  .receipt-date{ font-family:'JetBrains Mono', monospace; font-weight:700; font-size:16px; letter-spacing:-0.2px; }
  .receipt-vendor{ font-size:12.5px; color:var(--ink-soft); margin-top:2px; }
  .receipt-badges{ display:flex; flex-direction:column; align-items:flex-end; gap:6px; }
  .km-badge{
    background:var(--steel); color:#fff; font-family:'JetBrains Mono', monospace;
    font-size:11.5px; font-weight:700; padding:4px 9px; border-radius:20px;
  }
  .km-badge.empty{ background:#cfd3da; color:#5b5e66; }
  .kebab{ background:none; border:none; color:var(--ink-faint); font-size:18px; cursor:pointer; padding:2px 4px; line-height:1; }

  .receipt-items{ margin-top:12px; padding-top:10px; border-top:1px dashed var(--paper-line); }
  .ritem{ display:flex; align-items:baseline; gap:6px; font-size:13px; padding:4px 0; }
  .ritem .cat-dot{ width:6px; height:6px; border-radius:50%; flex:0 0 auto; margin-right:2px; }
  .ritem .label{ color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .ritem .leader{ flex:1; border-bottom:1px dotted var(--paper-line); height:1px; margin:0 4px; transform:translateY(-4px); }
  .ritem .amount{ font-family:'JetBrains Mono', monospace; font-weight:600; color:var(--ink); white-space:nowrap; }
  .ritem .amount.zero{ color:var(--red); }

  .receipt-total{
    display:flex; justify-content:space-between; align-items:center;
    margin-top:10px; padding-top:10px; border-top:1px solid var(--paper-line);
  }
  .receipt-total .t-label{ font-size:12px; color:var(--ink-soft); font-weight:600; }
  .receipt-total .t-amount{ font-family:'JetBrains Mono', monospace; font-weight:800; font-size:17px; color:var(--amber-deep); }

  .receipt-memo{ margin-top:8px; font-size:11.5px; color:var(--ink-soft); background:var(--paper-2); border-radius:8px; padding:7px 9px; }

  .actions-row{ display:flex; gap:8px; margin-top:10px; }
  .mini-btn{
    flex:1; border:1px solid var(--paper-line); background:transparent; color:var(--ink-soft);
    font-size:12px; padding:7px 0; border-radius:9px; font-weight:600; cursor:pointer;
  }
  .mini-btn.danger{ color:var(--red); border-color: rgba(210,72,63,0.3); }

  .empty-state{ text-align:center; padding:60px 20px; color:var(--ink-faint); }
  .empty-state .big{ font-size:34px; margin-bottom:8px; }

  /* ---------- fab ---------- */
  .fab{
    position:fixed; right:20px; bottom: calc(22px + var(--safe-bottom)); z-index:40;
    width:56px; height:56px; border-radius:50%;
    background: linear-gradient(135deg, var(--amber), var(--amber-deep));
    color:#1b1100; border:none; font-size:26px; font-weight:700;
    box-shadow: 0 10px 24px rgba(232,134,43,0.45);
    display:flex; align-items:center; justify-content:center; cursor:pointer;
  }
  #app-wrap{ max-width:560px; margin:0 auto; }

  /* ---------- sheet / modal ---------- */
  .scrim{
    position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:50;
    opacity:0; pointer-events:none; transition:opacity .2s;
  }
  .scrim.show{ opacity:1; pointer-events:auto; }
  .sheet{
    position:fixed; left:0; right:0; bottom:0; z-index:51;
    background:#1c2027; border-radius:22px 22px 0 0;
    max-width:560px; margin:0 auto;
    transform:translateY(100%); transition:transform .25s ease;
    max-height:88vh; overflow-y:auto;
    padding: 14px 18px calc(20px + var(--safe-bottom));
    border:1px solid var(--line-dark); border-bottom:none;
  }
  .sheet.show{ transform:translateY(0); }
  .sheet-handle{ width:36px; height:4px; background:#3a3f49; border-radius:4px; margin:0 auto 14px; }
  .sheet h3{ margin:0 0 14px; font-size:16px; color:#fff; }
  .field{ margin-bottom:12px; }
  .field label{ display:block; font-size:11.5px; color:var(--ink-faint); margin-bottom:5px; font-weight:600; }
  .field input, .field textarea{
    width:100%; background:var(--bg-3); border:1px solid var(--line-dark); border-radius:10px;
    padding:10px 11px; color:#fff; font-size:14px; font-family:inherit;
  }
  .field input::placeholder, .field textarea::placeholder{ color:#5b5f68; }
  .row2{ display:grid; grid-template-columns:1.1fr 1fr; gap:10px; }

  .chip-row{ display:flex; flex-wrap:wrap; gap:6px; margin-bottom:10px; }
  .chip{
    font-size:11.5px; padding:6px 10px; border-radius:20px; border:1px solid var(--line-dark);
    background:var(--bg-3); color:#cfd2d8; cursor:pointer;
  }

  .item-row{ display:flex; gap:8px; align-items:center; margin-bottom:8px; }
  .item-row input.label-in{ flex:1.3; }
  .item-row input.amount-in{ flex:1; }
  .item-row .rm{ background:none; border:none; color:var(--red); font-size:18px; cursor:pointer; padding:0 4px; }
  .add-item-btn{
    width:100%; padding:9px 0; border-radius:10px; border:1px dashed var(--line-dark);
    background:transparent; color:var(--ink-faint); font-size:12.5px; cursor:pointer; margin-top:2px;
  }

  .sheet-total{ display:flex; justify-content:space-between; align-items:center; margin:14px 0; font-size:13px; color:var(--ink-faint); }
  .sheet-total .v{ font-family:'JetBrains Mono', monospace; font-weight:800; font-size:18px; color:var(--amber); }

  .save-btn{
    width:100%; padding:13px 0; border-radius:12px; border:none;
    background: linear-gradient(135deg, var(--amber), var(--amber-deep));
    color:#1b1100; font-weight:800; font-size:14.5px; cursor:pointer;
  }
  .cancel-link{ display:block; text-align:center; margin-top:10px; color:var(--ink-faint); font-size:12.5px; background:none; border:none; width:100%; padding:8px; cursor:pointer; }

  /* ---------- auth gate ---------- */
  .gate{ min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:30px; text-align:center; }
  .gate .icon{ font-size:44px; margin-bottom:14px; }
  .gate h2{ font-size:18px; margin:0 0 6px; }
  .gate p{ font-size:13px; color:var(--ink-faint); margin:0 0 22px; line-height:1.6; }
  .google-btn{
    display:flex; align-items:center; gap:10px; background:#fff; color:#1b1d22;
    border:none; border-radius:12px; padding:12px 22px; font-size:14px; font-weight:700; cursor:pointer;
  }
  .setup-warning{
    margin:20px; padding:16px; background:var(--bg-3); border:1px solid var(--red); border-radius:14px;
    font-size:12.5px; line-height:1.7; color:#f0c6c2;
  }
  .setup-warning code{ background:#0e1014; padding:1px 5px; border-radius:5px; color:#fff; }

  .toast{
    position:fixed; left:50%; bottom:calc(100px + var(--safe-bottom)); transform:translateX(-50%);
    background:#fff; color:#1b1d22; font-size:13px; font-weight:600;
    padding:10px 18px; border-radius:30px; box-shadow:0 8px 20px rgba(0,0,0,0.3);
    z-index:80; opacity:0; pointer-events:none; transition:opacity .2s, transform .2s;
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(-6px); }

  .loading{ display:flex; align-items:center; justify-content:center; min-height:60vh; color:var(--ink-faint); font-size:13px; }
</style>
</head>

<script type="module">

const CATS = {
  engine:    { label:"엔진오일",  color:"#e8862b", interval:10000, match:["엔진오일"] },
  mission:   { label:"미션오일",  color:"#4a6fa5", interval:60000, match:["미션오일","변속기오일"] },

};
function detectCat(label){
  for(const key in CATS){
    if(key==="etc") continue;
    if(CATS[key].match.some(m=>label.includes(m))) return key;
  }
  return "etc";
}

  { date:"2024-04-24", mileage:null, vendor:"쿠팡",

  toastEl.textContent = msg;
  toastEl.classList.add("show");

}
function won(n){ return (n||0).toLocaleString("ko-KR") + "원"; }
function fmtDate(iso){
  const d = new Date(iso+"T00:00:00");
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,"0")}.${String(d.getDate()).padStart(2,"0")}`;

function recordTotal(r){ return (r.items||[]).reduce((s,i)=>s+(Number(i.amount)||0),0); }

if(NOT_CONFIGURED){
  root.innerHTML = `
    <div class="gate">
      <div class="icon">⚙️</div>
      <h2>Firebase 설정이 필요해요</h2>

      본인 Firebase 프로젝트 설정값을 붙여넣어주세요.</p>
      <div class="setup-warning" style="text-align:left;">
        Firebase 콘솔 → 프로젝트 설정 → 일반 → 내 앱에서<br/>
        <code>apiKey, authDomain, projectId, storageBucket, messagingSenderId, appId</code> 값을 복사해서
        HTML 상단 &lt;script&gt; 안의 값들을 교체하면 됩니다.<br/><br/>
        기존에 쓰던 <code>ward-app-257c4</code> 프로젝트 설정을 그대로 재사용하셔도 됩니다.
      </div>
    </div>`;
} else {
  const app = initializeApp(CFG);
  const auth = getAuth(app);
  const db = getDatabase(app);
  const provider = new GoogleAuthProvider();
  const recordsRef = ref(db, "car_care");

  let records = [];
  let unsub = null;
  let editingId = null;

  onAuthStateChanged(auth, (user)=>{
    if(user){
      renderApp(user);
      startListener();
    } else {
      if(unsub){ unsub(); unsub=null; }
      renderGate();
    }
  });

  function renderGate(){
    root.innerHTML = `
      <div class="gate">
        <div class="icon">🚗</div>
        <h2>차계부</h2>
        <p>${CAR_NAME} 정비 기록을 실시간으로 관리합니다.<br/>구글 계정으로 로그인해주세요.</p>
        <button class="google-btn" id="loginBtn">
          <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.9C16.64 14.2 17.64 11.94 17.64 9.2z"/><path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.9-2.26c-.8.54-1.84.86-3.06.86-2.35 0-4.34-1.59-5.05-3.72H.96v2.33A9 9 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.95 10.7A5.4 5.4 0 0 1 3.66 9c0-.59.1-1.17.29-1.7V4.97H.96A9 9 0 0 0 0 9c0 1.45.35 2.83.96 4.03l2.99-2.33z"/><path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58C13.46.89 11.43 0 9 0A9 9 0 0 0 .96 4.97l2.99 2.33C4.66 5.17 6.65 3.58 9 3.58z"/></svg>
          Google로 로그인
        </button>
      </div>`;
    document.getElementById("loginBtn").onclick = ()=> signInWithPopup(auth, provider).catch(e=>toast("로그인 실패: "+e.message));
  }

  async function ensureSeed(){
    const snap = await get(recordsRef);
    if(snap.exists()) return;
    const updates = {};
    SEED_RECORDS.forEach(r=>{
      const newRef = push(recordsRef);
      updates[newRef.key] = { ...r, total: recordTotal(r), createdAt: Date.now() };
    });
    await update(recordsRef, updates);
  }

  function startListener(){
    ensureSeed().then(()=>{
      unsub = onValue(recordsRef, (snap)=>{
        const val = snap.val() || {};
        records = Object.keys(val)
          .map(id=>({ id, ...val[id] }))
          .sort((a,b)=> b.date.localeCompare(a.date) || (b.createdAt||0)-(a.createdAt||0));
        renderList();
      }, (err)=>{
        toast("동기화 오류: "+err.message);
      });
    });
  }

  function renderApp(user){
    root.innerHTML = `
      <div id="app">
        <div class="topbar">
          <div class="brand">
            <span class="dot"></span>
            <div>
              <h1>${CAR_NAME}</h1>
              <div class="sub">${user.email||""}</div>
            </div>
          </div>
          <button class="iconbtn" id="logoutBtn" title="로그아웃">⎋</button>
        </div>

        <div class="hero" id="heroWrap"></div>
        <div class="section-title">
          <h2>다음 정비 예상</h2>
        </div>
        <div class="due-scroll" id="dueWrap"></div>

        <div class="section-title">
          <h2>정비 기록</h2>
          <span class="count" id="countLabel"></span>
        </div>
        <div class="timeline" id="timeline"></div>
      </div>
      <button class="fab" id="fabBtn">＋</button>
    `;
    document.getElementById("logoutBtn").onclick = ()=> signOut(auth);
    document.getElementById("fabBtn").onclick = ()=> openSheet(null);
    scrim.onclick = closeSheet;
  }

  function renderList(){
    if(!document.getElementById("heroWrap")) return;

    const withKm = records.filter(r=>r.mileage!=null).sort((a,b)=> (b.mileage||0)-(a.mileage||0));
    const currentKm = withKm.length ? withKm[0].mileage : 0;
    const lastDate = records.length ? records[0].date : null;
    const totalSpend = records.reduce((s,r)=> s + (r.total ?? recordTotal(r)), 0);

    // hero
    const digits = String(currentKm||0).split("");
    document.getElementById("heroWrap").innerHTML = `
      <div class="hero-card">
        <div class="hero-label">현재 주행거리</div>
        <div class="odometer">
          <div class="odo-digits">
            ${digits.map(d=>`<div class="odo-digit">${d}</div>`).join("")}
          </div>
          <span class="odo-unit">km</span>
        </div>
        <div class="hero-meta">마지막 정비 <b>${lastDate?fmtDate(lastDate):"-"}</b></div>
        <div class="stat-row">
          <div class="stat"><div class="v">${totalSpend.toLocaleString("ko-KR")}</div><div class="k">총 지출(원)</div></div>
          <div class="stat"><div class="v">${records.length}</div><div class="k">정비 횟수</div></div>
          <div class="stat"><div class="v">${withKm.length?withKm[0].mileage.toLocaleString("ko-KR"):"-"}</div><div class="k">최근 거리(km)</div></div>
        </div>
      </div>`;

    // due estimates
    const dueCats = ["engine","mission","fuel","brake"];
    const dueHtml = dueCats.map(key=>{
      const meta = CATS[key];
      let lastRec = null;
      for(const r of withKm){
        if((r.items||[]).some(i=>detectCat(i.label)===key)){ lastRec = r; break; }
      }
      if(!lastRec){
        return `<div class="due-card">
          <div class="cat"><span class="swatch" style="background:${meta.color}"></span>${meta.label}</div>
          <span class="due-status none">기록 없음</span>
          <div class="due-detail">아직 교체 기록이 없어요</div>
        </div>`;
      }
      const nextDue = lastRec.mileage + meta.interval;
      const remain = nextDue - currentKm;
      let statusClass="ok", statusText="정상";
      if(remain<=0){ statusClass="over"; statusText="교체 필요"; }
      else if(remain<=5000){ statusClass="soon"; statusText="곧 교체"; }
      return `<div class="due-card">
        <div class="cat"><span class="swatch" style="background:${meta.color}"></span>${meta.label}</div>
        <span class="due-status ${statusClass}">${statusText}</span>
        <div class="due-detail">최근 <span>${lastRec.mileage.toLocaleString("ko-KR")}</span>km<br/>예상 <span>${nextDue.toLocaleString("ko-KR")}</span>km</div>
      </div>`;
    }).join("");
    document.getElementById("dueWrap").innerHTML = dueHtml;

    document.getElementById("countLabel").textContent = `${records.length}건`;

    // timeline
    const tl = document.getElementById("timeline");
    if(records.length===0){
      tl.innerHTML = `<div class="empty-state"><div class="big">🧾</div>아직 기록이 없어요<br/>＋ 버튼으로 첫 정비 기록을 추가해보세요</div>`;
      return;
    }
    tl.innerHTML = records.map(r=>{
      const total = r.total ?? recordTotal(r);
      const itemsHtml = (r.items||[]).map(i=>{
        const c = CATS[detectCat(i.label)];
        return `<div class="ritem">
          <span class="cat-dot" style="background:${c.color}"></span>
          <span class="label">${i.label}</span>
          <span class="leader"></span>
          <span class="amount ${Number(i.amount)===0?'zero':''}">${won(i.amount)}</span>
        </div>`;
      }).join("");
      return `<div class="receipt" data-id="${r.id}">
        <div class="receipt-top">
          <div>
            <div class="receipt-date">${fmtDate(r.date)}</div>
            <div class="receipt-vendor">${r.vendor||""}</div>
          </div>
          <div class="receipt-badges">
            ${r.mileage!=null ? `<span class="km-badge">${r.mileage.toLocaleString("ko-KR")}km</span>` : `<span class="km-badge empty">거리 없음</span>`}
            <button class="kebab" data-act="menu">⋮</button>
          </div>
        </div>
        <div class="receipt-items">${itemsHtml}</div>
        <div class="receipt-total">
          <span class="t-label">합계</span>
          <span class="t-amount">${won(total)}</span>
        </div>
        ${r.memo ? `<div class="receipt-memo">${r.memo}</div>` : ""}
        <div class="actions-row" data-actions style="display:none;">
          <button class="mini-btn" data-act="edit">수정</button>
          <button class="mini-btn danger" data-act="delete">삭제</button>
        </div>
      </div>`;
    }).join("");

    tl.querySelectorAll(".receipt").forEach(card=>{
      const id = card.dataset.id;
      card.querySelector('[data-act="menu"]').onclick = ()=>{
        const a = card.querySelector("[data-actions]");
        a.style.display = a.style.display==="none" ? "flex" : "none";
      };
      const editBtn = card.querySelector('[data-act="edit"]');
      if(editBtn) editBtn.onclick = ()=> openSheet(records.find(r=>r.id===id));
      const delBtn = card.querySelector('[data-act="delete"]');
      if(delBtn) delBtn.onclick = async ()=>{
        if(confirm("이 정비 기록을 삭제할까요?")){
          await remove(ref(db, `car_care/${id}`));
          toast("삭제되었습니다");
        }
      };
    });
  }

  // ---------- sheet (add/edit) ----------
  let formItems = [];

  function openSheet(record){
    editingId = record ? record.id : null;
    formItems = record ? JSON.parse(JSON.stringify(record.items||[])) : [{label:"",amount:""}];

    sheet.innerHTML = `
      <div class="sheet-handle"></div>
      <h3>${record ? "정비 기록 수정" : "정비 기록 추가"}</h3>
      <div class="row2">
        <div class="field">
          <label>날짜</label>
          <input type="date" id="f-date" value="${record?record.date:new Date().toISOString().slice(0,10)}" />
        </div>
        <div class="field">
          <label>주행거리(km)</label>
          <input type="number" id="f-km" placeholder="선택" value="${record&&record.mileage!=null?record.mileage:""}" />
        </div>
      </div>
      <div class="field">
        <label>정비소 / 구매처</label>
        <input type="text" id="f-vendor" placeholder="예: 공임나라 옥곡점" value="${record?record.vendor||"":""}" />
      </div>

      <div class="field">
        <label>항목</label>
        <div class="chip-row" id="chipRow"></div>
        <div id="itemRows"></div>
        <button class="add-item-btn" id="addItemBtn">+ 항목 직접 추가</button>
      </div>

      <div class="field">
        <label>메모</label>
        <textarea id="f-memo" rows="2" placeholder="선택 사항">${record?record.memo||"":""}</textarea>
      </div>

      <div class="sheet-total"><span>합계</span><span class="v" id="sheetTotal">0원</span></div>
      <button class="save-btn" id="saveBtn">저장</button>
      <button class="cancel-link" id="cancelBtn">취소</button>
    `;

    const chipRow = document.getElementById("chipRow");
    chipRow.innerHTML = Object.values(CATS).filter(c=>c.label!=="기타").map(c=>
      `<button type="button" class="chip" data-label="${c.label}">${c.label}</button>`).join("");
    chipRow.querySelectorAll(".chip").forEach(ch=>{
      ch.onclick = ()=>{
        formItems.push({label:ch.dataset.label, amount:""});
        renderItemRows();
      };
    });

    document.getElementById("addItemBtn").onclick = ()=>{
      formItems.push({label:"",amount:""});
      renderItemRows();
    };
    document.getElementById("cancelBtn").onclick = closeSheet;
    document.getElementById("saveBtn").onclick = saveRecord;

    renderItemRows();
    scrim.classList.add("show");
    sheet.classList.add("show");
  }

  function renderItemRows(){
    const wrap = document.getElementById("itemRows");
    wrap.innerHTML = formItems.map((it,idx)=>`
      <div class="item-row">
        <input class="label-in" data-idx="${idx}" data-f="label" placeholder="항목명" value="${it.label||""}" />
        <input class="amount-in" type="number" data-idx="${idx}" data-f="amount" placeholder="금액" value="${it.amount===""||it.amount==null?"":it.amount}" />
        <button class="rm" data-idx="${idx}">×</button>
      </div>`).join("");
    wrap.querySelectorAll("input").forEach(inp=>{
      inp.oninput = ()=>{
        const i = Number(inp.dataset.idx);
        formItems[i][inp.dataset.f] = inp.dataset.f==="amount" ? inp.value : inp.value;
        updateSheetTotal();
      };
    });
    wrap.querySelectorAll(".rm").forEach(btn=>{
      btn.onclick = ()=>{
        formItems.splice(Number(btn.dataset.idx),1);
        if(formItems.length===0) formItems=[{label:"",amount:""}];
        renderItemRows();
      };
    });
    updateSheetTotal();
  }

  function updateSheetTotal(){
    const total = formItems.reduce((s,i)=> s + (Number(i.amount)||0), 0);
    const el = document.getElementById("sheetTotal");
    if(el) el.textContent = won(total);
  }

  function closeSheet(){
    scrim.classList.remove("show");
    sheet.classList.remove("show");
  }

  async function saveRecord(){
    const date = document.getElementById("f-date").value;
    const kmRaw = document.getElementById("f-km").value;
    const vendor = document.getElementById("f-vendor").value.trim();
    const memo = document.getElementById("f-memo").value.trim();
    if(!date){ toast("날짜를 입력해주세요"); return; }
    const cleanItems = formItems
      .filter(i=> (i.label||"").trim()!=="")
      .map(i=> ({ label:i.label.trim(), amount: Number(i.amount)||0 }));
    if(cleanItems.length===0){ toast("항목을 하나 이상 입력해주세요"); return; }

    const payload = {
      date,
      mileage: kmRaw==="" ? null : Number(kmRaw),
      vendor,
      items: cleanItems,
      total: cleanItems.reduce((s,i)=>s+i.amount,0),
      memo,
    };

    try{
      if(editingId){
        await update(ref(db, `car_care/${editingId}`), payload);
        toast("수정되었습니다");
      } else {
        const newRef = push(recordsRef);
        await set(newRef, { ...payload, createdAt: Date.now() });
        toast("추가되었습니다");
      }
      closeSheet();
    }catch(e){
      toast("저장 실패: "+e.message);
    }
  }
}
</script>
</body>
</html>
